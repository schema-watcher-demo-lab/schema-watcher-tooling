name: Schema Watcher

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  schema-watcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build watcher
        run: bun run build

      - name: Run Schema Watcher
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CREW_API_KEY: ${{ secrets.CREW_API_KEY }}
          SCHEMA_API_ENDPOINT: ${{ secrets.SCHEMA_API_ENDPOINT }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          KAFKA_BROKER: ${{ secrets.KAFKA_BROKER }}
          KAFKA_TOPIC: ${{ secrets.KAFKA_TOPIC }}
          PR_NUMBER: ${{ github.event.pull_request.number || 1 }}
        run: |
          set -euo pipefail

          args=(
            --repo "${GITHUB_REPOSITORY:-owner/repo}"
            --pr "${PR_NUMBER:-1}"
          )
          if [ -n "${SCHEMA_API_ENDPOINT:-}" ]; then
            args+=(--api-endpoint "${SCHEMA_API_ENDPOINT}")
          fi
          if [ -n "${CREW_API_KEY:-}" ]; then
            args+=(--api-key "${CREW_API_KEY}")
          fi
          if [ -n "${SLACK_WEBHOOK:-}" ]; then
            args+=(--slack-webhook "${SLACK_WEBHOOK}")
          fi
          if [ -n "${KAFKA_BROKER:-}" ]; then
            args+=(--kafka-broker "${KAFKA_BROKER}")
          fi
          if [ -n "${KAFKA_TOPIC:-}" ]; then
            args+=(--kafka-topic "${KAFKA_TOPIC}")
          fi

          node dist/index.js "${args[@]}"
        shell: bash
